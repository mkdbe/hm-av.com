# hm-av.com — reverse proxy to Express app on port 4200

server {
    listen 80;
    server_name hm-av.com www.hm-av.com;
    return 301 https://hm-av.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.hm-av.com;

    # SSL certs — update paths after certbot setup
    ssl_certificate /etc/letsencrypt/live/hm-av.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hm-av.com/privkey.pem;

    return 301 https://hm-av.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hm-av.com;

    # SSL certs — update paths after certbot setup
    ssl_certificate /etc/letsencrypt/live/hm-av.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hm-av.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Static assets — serve directly from nginx with caching
    location /css/ {
        alias /var/www/html/hm-av.com/public/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        alias /var/www/html/hm-av.com/public/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        alias /var/www/html/hm-av.com/public/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else proxied to Express
    location / {
        proxy_pass http://127.0.0.1:4200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
